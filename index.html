function AssessPage({ responses, updateResponse, clearResponse }) {
  const applicable = MATERIALITY_TOPICS.filter(t => responses[t.code] && responses[t.code].applicable === true);
  const evaluated = applicable.filter(t => {
    const r = responses[t.code];
    return r.scale > 0 && r.scope > 0 && r.irrem > 0 && r.finImpact > 0 && r.finLikelihood > 0;
  }).length;
  const [expandedCode, setExpandedCode] = useState(null);
  if (applicable.length === 0) {
    return (
      <div style={{ maxWidth: 700, padding: 40, textAlign: "center" }}>
        <h3 style={{ fontSize: 18, fontWeight: 700, color: "#111827", marginBottom: 12 }}>평가할 주제가 없습니다</h3>
        <p style={{ fontSize: 13, color: "#6b7280" }}>먼저 <strong>2단계 주제 진단</strong>에서 해당되는 주제를 선택해주세요.</p>
      </div>
    );
  }
  return (
    <div style={{ maxWidth: 980 }}>
      <div style={{ marginBottom: 20 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
          <h3 style={{ fontSize: 18, fontWeight: 700, color: "#111827", margin: 0 }}>⚖️ 3단계: 이중 평가</h3>
          {evaluated > 0 && <span style={{ fontSize: 11, fontWeight: 700, color: "#fff", background: "#10b981", padding: "3px 10px", borderRadius: 4 }}>✅ 자동저장됨 ({evaluated}/{applicable.length})</span>}
        </div>
        <p style={{ fontSize: 13, color: "#6b7280", marginBottom: 4 }}><strong>GRI 3 공식 방법</strong>에 따라 Scale·Scope·Irremediable·Likelihood·Financial 5요소로 평가합니다.</p>
        <p style={{ fontSize: 12, color: "#9ca3af" }}>진행: {evaluated} / {applicable.length}</p>
      </div>
      <div style={{ background: "#eff6ff", border: "1px solid #bfdbfe", borderRadius: 8, padding: 14, marginBottom: 16, fontSize: 12, color: "#1e40af" }}>
        💡 <strong>영향 중요도</strong> = Severity(Scale × Scope × Irremediable) × Likelihood · <strong>재무 중요도</strong> = 재무영향 × 발생가능성
      </div>
      {applicable.map(t => {
        const r = responses[t.code] || {};
        const catColor = { "환경": "#10b981", "사회": "#3b82f6", "지배구조": "#8b5cf6" }[t.cat];
        const isComplete = r.scale > 0 && r.scope > 0 && r.irrem > 0 && r.finImpact > 0 && r.finLikelihood > 0;
        const isExpanded = expandedCode === t.code;
        const impact = calcImpact(r);
        const financial = calcFinancial(r);
        return (
          <div key={t.code} style={{ background: "#fff", border: `1px solid ${isComplete ? catColor : "#e5e7eb"}`, borderRadius: 8, marginBottom: 10 }}>
            <div onClick={() => setExpandedCode(isExpanded ? null : t.code)}
              style={{ padding: 14, cursor: "pointer", display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ fontSize: 11, fontWeight: 700, color: catColor, background: catColor + "15", padding: "2px 6px", borderRadius: 3 }}>{t.code}</span>
              <span style={{ fontSize: 14, fontWeight: 700, color: "#111827", flex: 1 }}>{t.title}</span>
              {isComplete && (
                <>
                  <span style={{ fontSize: 11, color: "#6b7280" }}>영향 <strong style={{ color: catColor }}>{(impact*100).toFixed(0)}</strong> / 재무 <strong style={{ color: catColor }}>{(financial*100).toFixed(0)}</strong></span>
                  <span style={{ fontSize: 10, color: "#fff", background: "#10b981", padding: "2px 6px", borderRadius: 3, fontWeight: 700 }}>✓ 완료</span>
                </>
              )}
              {!isComplete && <span style={{ fontSize: 10, color: "#fff", background: "#f59e0b", padding: "2px 6px", borderRadius: 3, fontWeight: 700 }}>미완료</span>}
              <span style={{ fontSize: 10, color: "#9ca3af" }}>{isExpanded ? "▲" : "▼"}</span>
            </div>
            {isExpanded && (
              <div style={{ padding: "0 14px 14px 14px", borderTop: "1px solid #f3f4f6" }}>
                <p style={{ fontSize: 12, color: "#6b7280", marginTop: 12, marginBottom: 16, lineHeight: 1.6 }}>{t.desc}</p>
                <div style={{ marginBottom: 14 }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: "#374151", marginBottom: 6 }}>📌 영향 유형</div>
                  <div style={{ display: "flex", gap: 6 }}>
                    <button onClick={() => updateResponse(t.code, { isActual: true })}
                      style={{ flex: 1, padding: "8px 12px", fontSize: 12, fontWeight: 600, border: `1.5px solid ${r.isActual === true ? catColor : "#e5e7eb"}`, background: r.isActual === true ? catColor : "#fff", color: r.isActual === true ? "#fff" : "#6b7280", borderRadius: 5, cursor: "pointer" }}>실제 영향 (이미 발생)</button>
                    <button onClick={() => updateResponse(t.code, { isActual: false })}
                      style={{ flex: 1, padding: "8px 12px", fontSize: 12, fontWeight: 600, border: `1.5px solid ${r.isActual === false ? catColor : "#e5e7eb"}`, background: r.isActual === false ? catColor : "#fff", color: r.isActual === false ? "#fff" : "#6b7280", borderRadius: 5, cursor: "pointer" }}>잠재 영향 (발생 가능)</button>
                  </div>
                </div>
                <FactorRow label="① Scale (규모)" desc="영향의 크기·심각성" options={SCALE_OPTS} value={r.scale} onChange={v => updateResponse(t.code, { scale: v })} color={catColor} />
                <FactorRow label="② Scope (범위)" desc="영향을 받는 대상·지역" options={SCOPE_OPTS} value={r.scope} onChange={v => updateResponse(t.code, { scope: v })} color={catColor} />
                <FactorRow label="③ Irremediable (회복불가능성)" desc="회복이 어려운 정도" options={IRREM_OPTS} value={r.irrem} onChange={v => updateResponse(t.code, { irrem: v })} color={catColor} />
                {r.isActual === false && (
                  <FactorRow label="④ Likelihood (발생 가능성)" desc="잠재 영향 전용" options={LIKELIHOOD_OPTS} value={r.likelihood} onChange={v => updateResponse(t.code, { likelihood: v })} color={catColor} />
                )}
                <div style={{ marginTop: 16, padding: 12, background: "#fffbeb", border: "1px solid #fcd34d", borderRadius: 6 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#92400e", marginBottom: 10 }}>💰 재무 중요도 평가</div>
                  <FactorRow label="⑤ 재무 영향 규모" desc="매출·이익·비용 영향" options={FIN_IMPACT_OPTS} value={r.finImpact} onChange={v => updateResponse(t.code, { finImpact: v })} color="#d97706" />
                  <FactorRow label="⑥ 재무 발생 가능성" desc="해당 재무 영향이 실제 발생할 확률" options={LIKELIHOOD_OPTS} value={r.finLikelihood} onChange={v => updateResponse(t.code, { finLikelihood: v })} color="#d97706" />
                </div>
                {isComplete && (
                  <div style={{ marginTop: 14, padding: 12, background: "#ecfdf5", border: "1px solid #10b981", borderRadius: 6, fontSize: 12 }}>
                    <div style={{ fontWeight: 700, color: "#065f46", marginBottom: 6 }}>📊 계산 결과</div>
                    <div style={{ color: "#065f46", lineHeight: 1.7 }}>
                      · Severity (규모×범위×회복불가)<sup>1/3</sup> = <strong>{((calcSeverity(r.scale, r.scope, r.irrem)) * 100).toFixed(0)}점</strong><br/>
                      · 영향 중요도 = Severity × {r.isActual ? "1.0 (실제)" : `${(LIKERT5_MAP[r.likelihood] || 0).toFixed(1)} (잠재)`} = <strong>{(impact * 100).toFixed(0)}점</strong><br/>
                      · 재무 중요도 = {(LIKERT5_MAP[r.finImpact] || 0).toFixed(1)} × {(LIKERT5_MAP[r.finLikelihood] || 0).toFixed(1)} = <strong>{(financial * 100).toFixed(0)}점</strong>
                    </div>
                  </div>
                )}
                <div style={{ marginTop: 12, textAlign: "right" }}>
                  <button onClick={() => {
                    if (confirm(`${t.title} 평가를 초기화하시겠습니까?`)) {
                      clearResponse(t.code);
                      updateResponse(t.code, { applicable: true });
                    }
                  }} style={{ fontSize: 11, color: "#dc2626", background: "#fff", border: "1px solid #fca5a5", padding: "4px 10px", borderRadius: 4, cursor: "pointer" }}>🔄 이 주제 재평가</button>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function ConfirmPage({ responses, data, setBlockData, MAT_KEY, meta }) {
  const result = calculateMaterialityV2(responses, meta.threshold || "top35");
  const confirmed = data.confirmed || false;
  const confirmedAt = data.confirmedAt;
  const anomalies = detectAnomalies(responses);
  const highAnomalies = anomalies.filter(a => a.severity === "high").length;
  const handleConfirm = () => {
    setBlockData(MAT_KEY, {
      content_json: {
        ...data, confirmed: true, confirmedAt: new Date().toISOString(),
        coreTopics: result.core.map(c => c.code),
        history: [...(data.history || []), {
          at: new Date().toISOString(),
          coreTopics: result.core.map(c => c.code),
          threshold: meta.threshold,
        }]
      },
      content_text: null,
    });
  };
  const handleReopen = () => {
    if (confirm("확정을 해제하고 수정 모드로 전환하시겠습니까? 이력은 보존됩니다.")) {
      setBlockData(MAT_KEY, { content_json: { ...data, confirmed: false }, content_text: null });
    }
  };
  if (result.all.length === 0) {
    return <div style={{ maxWidth: 700, padding: 40, textAlign: "center" }}><p style={{ fontSize: 13, color: "#6b7280" }}>먼저 평가를 완료해주세요.</p></div>;
  }
  return (
    <div style={{ maxWidth: 900 }}>
      <div style={{ marginBottom: 20 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
          <h3 style={{ fontSize: 18, fontWeight: 700, color: "#111827", margin: 0 }}>✅ 6단계: 확정</h3>
          {confirmed
            ? <span style={{ fontSize: 11, fontWeight: 700, color: "#fff", background: "#059669", padding: "3px 10px", borderRadius: 4 }}>🔒 확정 완료</span>
            : <span style={{ fontSize: 11, fontWeight: 700, color: "#92400e", background: "#fef3c7", padding: "3px 10px", borderRadius: 4, border: "1px solid #fcd34d" }}>확정 대기</span>
          }
        </div>
        <p style={{ fontSize: 13, color: "#6b7280" }}>아래 {result.core.length}개 주제가 보고서 필수 공시 대상으로 확정됩니다. 확정 후에도 "재오픈"으로 수정 가능 (이력 보존).</p>
      </div>
      {highAnomalies > 0 && (
        <div style={{ background: "#fef2f2", border: "2px solid #fca5a5", borderRadius: 8, padding: 14, marginBottom: 16 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#991b1b", marginBottom: 4 }}>⛔ 재검토 필수 이슈 {highAnomalies}건</div>
          <div style={{ fontSize: 12, color: "#991b1b", lineHeight: 1.6 }}>확정 전 4단계 이상치 리포트를 확인하시기 바랍니다.</div>
        </div>
      )}
      <div style={{ background: "#fff", border: "2px solid #d97706", borderRadius: 8, padding: 18, marginBottom: 16 }}>
        <h4 style={{ fontSize: 15, fontWeight: 700, color: "#92400e", marginBottom: 12 }}>🎯 확정 대상 핵심 이슈</h4>
        {result.core.map(c => (
          <div key={c.code} style={{ padding: "10px 12px", background: "#fef3c7", borderRadius: 5, marginBottom: 6 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <strong>{c.code}</strong> · {c.title}
                <div style={{ fontSize: 10, color: "#92400e", marginTop: 2 }}>GRI: {c.gri.join(" · ")} &nbsp;|&nbsp; K-ESG: {c.kesg.join(" · ")}</div>
              </div>
              <div style={{ fontSize: 11, color: "#92400e" }}>영향 {(c.impact*100).toFixed(0)} / 재무 {(c.financial*100).toFixed(0)}</div>
            </div>
          </div>
        ))}
      </div>
      {confirmed ? (
        <div style={{ display: "flex", gap: 8 }}>
          <div style={{ flex: 1, background: "#d1fae5", border: "1px solid #10b981", borderRadius: 8, padding: 14, fontSize: 13, color: "#065f46" }}>
            ✓ <strong>확정 완료</strong> · {confirmedAt ? new Date(confirmedAt).toLocaleDateString("ko-KR") : ''} · 보고서 공시에 자동 반영됩니다.
          </div>
          <button onClick={handleReopen} style={{ padding: "12px 20px", fontSize: 13, fontWeight: 600, background: "#fff", color: "#dc2626", border: "1.5px solid #fca5a5", borderRadius: 8, cursor: "pointer" }}>🔄 수정 모드 전환</button>
        </div>
      ) : (
        <button onClick={handleConfirm} style={{ width: "100%", padding: "12px 20px", fontSize: 14, fontWeight: 700, background: "#d97706", color: "#fff", border: "none", borderRadius: 8, cursor: "pointer" }}>✓ 핵심 주제 확정하기</button>
      )}
      {data.history && data.history.length > 0 && (
        <div style={{ marginTop: 20, background: "#fff", border: "1px solid #e5e7eb", borderRadius: 8, padding: 14 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#6b7280", marginBottom: 8 }}>📅 확정 이력</div>
          {data.history.slice().reverse().map((h, i) => (
            <div key={i} style={{ fontSize: 11, color: "#9ca3af", padding: "4px 0", borderTop: i > 0 ? "1px solid #f3f4f6" : "none" }}>
              {new Date(h.at).toLocaleString("ko-KR")} · 핵심 이슈 {h.coreTopics?.length || 0}개 · 기준: {h.threshold}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

        <p style={{ fontSize: 11, color: "#1e40af", marginBottom: 10, lineHeight: 1.5 }}>
          이해관계자(고객·협력사·임직원·지역사회 등)의 의견을 어떻게 수렴·반영했는지 기록하면 보고서에 자동 포함됩니다.

          style={{ width: "100%", minHeight: 80, padding: 10, fontSize: 12, border: "1px solid #bfdbfe", borderRadius: 5, resize: "vertical", fontFamily: "inherit" }}

          {paragraphs.valueChainText && (
            <>
              <div style={{ fontWeight: 700, marginBottom: 8, color: "#111827" }}>■ 가치사슬 매핑</div>
              <p style={{ margin: "0 0 16px 0", whiteSpace: "pre-wrap" }}>{paragraphs.valueChainText}</p>
            </>
          )}
          <div style={{ fontWeight: 700, marginBottom: 8, color: "#111827" }}>■ 핵심 이슈 도출 결과</div>
          <p style={{ margin: "0 0 16px 0", whiteSpace: "pre-wrap" }}>{paragraphs.coreText}</p>
          <div style={{ fontWeight: 700, marginBottom: 8, color: "#111827" }}>■ 핵심 이슈별 상세</div>
          <pre style={{ margin: "0 0 16px 0", whiteSpace: "pre-wrap", fontFamily: "inherit", fontSize: 12, background: "#f9fafb", padding: 12, borderRadius: 5 }}>{paragraphs.coreDetails}</pre>
          {paragraphs.manageText && (
            <>
              <div style={{ fontWeight: 700, marginBottom: 8, color: "#111827" }}>■ 관리 이슈</div>
              <p style={{ margin: "0 0 16px 0", whiteSpace: "pre-wrap" }}>{paragraphs.manageText}</p>
            </>
          )}
          {stakeholderNotes && (
            <>
              <div style={{ fontWeight: 700, marginBottom: 8, color: "#111827" }}>■ 이해관계자 의견 반영</div>
              <p style={{ margin: "0", whiteSpace: "pre-wrap" }}>{stakeholderNotes}</p>
            </>
          )}
        </div>
      </div>
      <div style={{ background: "#eff6ff", border: "1px solid #3b82f6", borderRadius: 8, padding: 14, fontSize: 12, color: "#1e40af" }}>
        💡 이 문단은 <strong>GRI 3 Material Topics 2021 공시 요건</strong>을 충족하는 골격입니다. 회사 맥락을 추가로 반영하시기 바랍니다.
      </div>
    </div>
  );
}

// ===== v0.8: 카테고리 자동 METRICS 표 + 미니 그래프 =====
function formatAutoNum(v) {
  if (v === null || v === undefined) return "-";
  if (!v || v === 0) return "0";
  if (Math.abs(v) >= 1000) return v.toLocaleString(undefined, { maximumFractionDigits: 0 });
  if (Math.abs(v) >= 10) return v.toLocaleString(undefined, { maximumFractionDigits: 1 });
  return v.toLocaleString(undefined, { maximumFractionDigits: 2 });
}

function AutoBarChart({ rows }) {
  const top = rows.slice(0, 6);
  if (top.length === 0) return null;
  const W = 720, H = 260;
  const M = { top: 20, right: 20, bottom: 80, left: 80 };
  const PW = W - M.left - M.right;
  const PH = H - M.top - M.bottom;
  const groupW = PW / top.length;
  const allVals = top.flatMap(r => [r.v2023, r.v2024, r.v2025]);
  const maxVal = Math.max(...allVals, 1);
  const niceMax = maxVal * 1.15;
  const COL = { c23: "#6b7280", c24: "#3b82f6", c25: "#10b981" };
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", maxHeight: 320, marginTop: 16, display: "block" }}>
      {[0, 0.25, 0.5, 0.75, 1].map(r => {
        const y = M.top + PH * (1 - r);
        return (
          <g key={r}>
            <line x1={M.left} y1={y} x2={M.left + PW} y2={y} stroke="rgba(255,255,255,0.08)" strokeDasharray="2 4" />
            <text x={M.left - 8} y={y + 4} textAnchor="end" fontSize="10" fill="rgba(255,255,255,0.5)">{formatAutoNum(niceMax * r)}</text>
          </g>
        );
      })}
      <line x1={M.left} y1={M.top + PH} x2={M.left + PW} y2={M.top + PH} stroke="rgba(255,255,255,0.3)" />
      {top.map((r, i) => {
        const gx = M.left + groupW * i + groupW / 2;
        const items = [
          { v: r.v2023, c: COL.c23, y: 2023 },
          { v: r.v2024, c: COL.c24, y: 2024 },
          { v: r.v2025, c: COL.c25, y: 2025 },
        ];
        const barW = 18;
        const gap = 3;
        const totalW = items.length * barW + (items.length - 1) * gap;
        const sx = gx - totalW / 2;
        const lbl = r.field.label.length > 12 ? r.field.label.slice(0, 12) + "…" : r.field.label;
        return (
          <g key={r.field.id}>
            {items.map((it, j) => {
              const h = it.v > 0 ? (it.v / niceMax) * PH : 0;
              const bx = sx + j * (barW + gap);
              const by = M.top + PH - h;
              return (
                <g key={j}>
                  <rect x={bx} y={by} width={barW} height={h} fill={it.c} rx="2">
                    <title>{r.field.label} ({it.y}): {formatAutoNum(it.v)} {r.field.unit || ""}</title>
                  </rect>
                </g>
              );
            })}
            <text x={gx} y={M.top + PH + 18} textAnchor="middle" fontSize="10" fill="rgba(255,255,255,0.75)">{lbl}</text>
            {r.field.unit && <text x={gx} y={M.top + PH + 32} textAnchor="middle" fontSize="9" fill="rgba(255,255,255,0.4)">({r.field.unit})</text>}
          </g>
        );
      })}
      <g transform={`translate(${M.left}, ${H - 18})`}>
        {[{ lbl: "2023", c: COL.c23 }, { lbl: "2024", c: COL.c24 }, { lbl: "2025", c: COL.c25 }].map((it, i) => (
          <g key={i} transform={`translate(${i * 70}, 0)`}>
            <rect width="10" height="10" fill={it.c} rx="2" />
            <text x="14" y="9" fontSize="11" fill="rgba(255,255,255,0.75)">{it.lbl}</text>
          </g>
        ))}
      </g>
    </svg>
  );
}

function CategoryAutoSummary({ fields, inputs, sites, categoryName, categoryCode }) {
  if (!fields || fields.length === 0) return null;

  const tableFields = fields.filter(f => f.input_type === "number" && f.is_by_year);
  const narrativeFields = fields.filter(f => (f.input_type === "textarea" || f.input_type === "text") && !f.is_by_year);

  // 연도별 전사 합계 (is_by_site이면 사업장 모두 합산)
  function getYearSum(field, year) {
    let sum = 0, any = false;
    if (field.is_by_site) {
      (sites || []).forEach(s => {
        const row = inputs[inputKey(field.id, s.id, year)];
        if (row && row.value_number !== null && row.value_number !== undefined) {
          const v = parseFloat(row.value_number);
          if (!isNaN(v)) { sum += v; any = true; }
        }
      });
    } else {
      const row = inputs[inputKey(field.id, null, year)];
      if (row && row.value_number !== null && row.value_number !== undefined) {
        const v = parseFloat(row.value_number);
        if (!isNaN(v)) { sum += v; any = true; }
      }
    }
    return { sum, any };
  }

  const allRows = tableFields.map(f => {
    const r23 = getYearSum(f, 2023);
    const r24 = getYearSum(f, 2024);
    const r25 = getYearSum(f, 2025);
    const hasAny = r23.any || r24.any || r25.any;
    const delta = r25.sum - r24.sum;
    const deltaPct = (r24.any && r24.sum !== 0) ? ((r25.sum - r24.sum) / r24.sum * 100) : null;
    return {
      field: f,
      v2023: r23.sum, v2024: r24.sum, v2025: r25.sum,
      has2023: r23.any, has2024: r24.any, has2025: r25.any,
      hasAny, delta, deltaPct,
    };
  });

  const filledRows = allRows.filter(r => r.hasAny);
  const emptyRows = allRows.filter(r => !r.hasAny);

  // 서술형 필드 (POLICY/ACTIONS/TARGETS 자동 판별)
  function classifyNarrative(f) {
    const text = ((f.label || "") + " " + (f.description || "")).toLowerCase();
    if (/정책|policy|방침|원칙|규정/.test(text)) return "POLICY";
    if (/목표|target|중장기|단기|계획|로드맵/.test(text)) return "TARGETS";
    if (/활동|action|이니셔티브|프로그램|실행|조치|관리/.test(text)) return "ACTIONS";
    return "ACTIONS";
  }
  const narrativeByType = { POLICY: [], ACTIONS: [], TARGETS: [] };
  narrativeFields.forEach(f => {
    const row = inputs[inputKey(f.id, f.is_by_site ? (sites[0]?.id) : null, 0)];
    const val = row && row.value_text ? String(row.value_text).trim() : "";
    if (val) narrativeByType[classifyNarrative(f)].push({ label: f.label, text: val });
  });

  const hasNarrative = narrativeByType.POLICY.length + narrativeByType.ACTIONS.length + narrativeByType.TARGETS.length > 0;

  // Markdown 표 복사
  function buildMdTable() {
    let md = `## ${categoryName}${categoryCode ? " · " + categoryCode : ""} — METRICS\n\n`;
    md += "| 구분 | 단위 | 2023 | 2024 | 2025 | 전년 대비 |\n";
    md += "|---|---|---:|---:|---:|---:|\n";
    filledRows.forEach(r => {
      const pct = r.deltaPct !== null && !isNaN(r.deltaPct)
        ? `${r.deltaPct > 0 ? "▲" : r.deltaPct < 0 ? "▼" : "-"} ${Math.abs(r.deltaPct).toFixed(1)}%`
        : "-";
      md += `| ${r.field.label} | ${r.field.unit || "-"} | ${formatAutoNum(r.v2023)} | ${formatAutoNum(r.v2024)} | ${formatAutoNum(r.v2025)} | ${pct} |\n`;
    });
    return md;
  }

  function copyTable() {
    const md = buildMdTable();
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(md).then(
        () => alert("📋 보고서용 표가 클립보드에 복사되었습니다.\n\n워드/노션/보고서에 Ctrl+V로 붙여넣기 하세요."),
        () => alert("❌ 복사 실패. 브라우저에서 클립보드 권한을 허용해주세요.")
      );
    } else {
      const ta = document.createElement("textarea");
      ta.value = md; document.body.appendChild(ta); ta.select();
      try { document.execCommand("copy"); alert("📋 보고서용 표가 복사되었습니다."); }
      catch (e) { alert("❌ 복사 실패"); }
      document.body.removeChild(ta);
    }
  }

  if (tableFields.length === 0 && !hasNarrative) return null;

  return (
    <div className="auto-summary-block">
      <div className="auto-summary-header">
        <div>
          <div className="auto-summary-title">📊 METRICS · 보고서 자동 생성 표</div>
          <div className="auto-summary-sub">
            {tableFields.length > 0
              ? `${filledRows.length}개 입력됨 / ${tableFields.length}개 필드 · 2023·2024·2025 전사 합계`
              : "숫자형 필드 없음"}
          </div>
        </div>
        {filledRows.length > 0 && (
          <button className="auto-summary-copy" onClick={copyTable}>
            📋 보고서용 복사
          </button>
        )}
      </div>

      {tableFields.length > 0 && (
        filledRows.length > 0 ? (
          <>
            <table className="auto-summary-table">
              <thead>
                <tr>
                  <th>구분</th>
                  <th>단위</th>
                  <th style={{ textAlign: "right" }}>2023</th>
                  <th style={{ textAlign: "right" }}>2024</th>
                  <th className="latest" style={{ textAlign: "right" }}>2025</th>
                  <th style={{ textAlign: "right" }}>전년 대비</th>
                </tr>
              </thead>
              <tbody>
                {filledRows.map(r => (
                  <tr key={r.field.id}>
                    <td className="row-label">{r.field.label}</td>
                    <td className="row-unit">{r.field.unit || "-"}</td>
                    <td className="row-num">{r.has2023 ? formatAutoNum(r.v2023) : "-"}</td>
                    <td className="row-num">{r.has2024 ? formatAutoNum(r.v2024) : "-"}</td>
                    <td className="row-num latest">{r.has2025 ? formatAutoNum(r.v2025) : "-"}</td>
                    <td className={"row-delta " + (r.deltaPct !== null ? (r.deltaPct > 0 ? "up" : r.deltaPct < 0 ? "down" : "") : "")}>
                      {r.deltaPct !== null && !isNaN(r.deltaPct)
                        ? (r.deltaPct === 0 ? "—" : (r.deltaPct > 0 ? "▲" : "▼") + " " + Math.abs(r.deltaPct).toFixed(1) + "%")
                        : "-"}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            <AutoBarChart rows={filledRows} />
            {emptyRows.length > 0 && (
              <div className="auto-summary-missing">
                💡 아직 입력되지 않은 필드 ({emptyRows.length}개): {emptyRows.slice(0, 5).map(r => r.field.label).join(", ")}
                {emptyRows.length > 5 ? ` 외 ${emptyRows.length - 5}개` : ""}
              </div>
            )}
          </>
        ) : (
          <div className="auto-summary-empty">
            아직 입력된 숫자 데이터가 없습니다.<br/>
            아래 입력 필드에 2023·2024·2025 값을 입력하면 보고서용 표가 자동 생성됩니다.
          </div>
        )
      )}

      {hasNarrative && (
        <div className="auto-summary-report">
          <h4>📝 POLICY · ACTIONS · TARGETS 서술 자동 집계</h4>
          {["POLICY", "ACTIONS", "TARGETS"].map(k => (
            narrativeByType[k].length > 0 && (
              <div key={k} className="auto-summary-report-item">
                <div className="auto-summary-report-label">{k}</div>
                {narrativeByType[k].map((it, i) => (
                  <div key={i} className="auto-summary-report-text">
                    <strong style={{ color: "rgba(196,181,253,0.9)" }}>• {it.label}</strong>: {it.text}
                  </div>
                ))}
              </div>
            )
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
