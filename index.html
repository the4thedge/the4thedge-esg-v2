<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The 4th Edge · ESG 플랫폼 v0.8</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", Roboto, sans-serif;
    background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
    min-height: 100vh;
    color: #fff;
    overflow: hidden;
  }
  #root { min-height: 100vh; height: 100vh; }

  /* ===== 로그인·회사선택 공통 카드 ===== */
  .center {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: auto;
  }
  .card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .card-wide { max-width: 720px; }
  .logo {
    font-size: 13px; letter-spacing: 6px; color: #88ccff;
    margin-bottom: 14px; font-weight: 600; text-align: center;
  }
  h1 {
    font-size: 28px; line-height: 1.25; margin-bottom: 8px;
    font-weight: 700; text-align: center;
  }
  h2 { font-size: 22px; line-height: 1.3; margin-bottom: 8px; font-weight: 700; }
  .subtitle {
    font-size: 14px; color: #a0b8c8; margin-bottom: 32px;
    text-align: center; line-height: 1.5;
  }
  label {
    display: block; font-size: 13px; color: #a0b8c8;
    margin-bottom: 6px; font-weight: 600; letter-spacing: 0.5px;
  }
  input[type=email], input[type=password], input[type=text] {
    width: 100%; background: rgba(0, 0, 0, 0.35);
    border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 10px;
    padding: 13px 16px; color: #fff; font-size: 15px;
    transition: border 0.15s; font-family: inherit;
  }
  input:focus { outline: none; border-color: #88ccff; }
  .field { margin-bottom: 16px; }

  button {
    background: linear-gradient(135deg, #3b82f6 0%, #0ea5e9 100%);
    color: #fff; border: none; padding: 13px 20px; border-radius: 10px;
    font-size: 15px; font-weight: 600; cursor: pointer; width: 100%;
    transition: transform 0.12s, box-shadow 0.12s; font-family: inherit;
  }
  button:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(59,130,246,0.4); }
  button:active { transform: translateY(0); }
  button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  button.ghost {
    background: transparent; border: 1px solid rgba(255,255,255,0.2);
    color: #a0b8c8; box-shadow: none;
  }
  button.ghost:hover { background: rgba(255,255,255,0.05); box-shadow: none; }

  .err {
    background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3);
    color: #fca5a5; padding: 12px 14px; border-radius: 8px; font-size: 13px;
    margin-bottom: 16px; line-height: 1.5;
  }
  .muted {
    color: #6b8290; font-size: 12px; text-align: center;
    margin-top: 20px; letter-spacing: 1px;
  }

  /* ===== 회사 선택 ===== */
  .company-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px; margin-top: 24px;
  }
  .company-card {
    background: rgba(0, 0, 0, 0.25); border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 12px; padding: 20px 18px; cursor: pointer;
    transition: all 0.15s; text-align: left;
  }
  .company-card:hover {
    background: rgba(136, 204, 255, 0.08); border-color: #88ccff;
    transform: translateY(-2px);
  }
  .company-card .cname { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .company-card .ccode { font-size: 11px; color: #6b8290; letter-spacing: 1px; text-transform: uppercase; }

  /* ===== 레이아웃: 사이드바 + 메인 ===== */
  .app-layout {
    display: flex; height: 100vh; overflow: hidden;
  }

  /* ===== 사이드바 ===== */
  .sidebar {
    width: 280px; flex-shrink: 0;
    background: rgba(0, 0, 0, 0.35);
    border-right: 1px solid rgba(255,255,255,0.06);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sb-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .sb-brand { font-size: 12px; letter-spacing: 4px; color: #88ccff; font-weight: 700; }
  .sb-company {
    margin-top: 10px;
    background: rgba(136, 204, 255, 0.1);
    border: 1px solid rgba(136, 204, 255, 0.25);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .sb-company-name { font-size: 14px; font-weight: 700; color: #c9e4f7; }
  .sb-company-change {
    font-size: 11px; color: #88ccff; background: none; border: none;
    padding: 4px 8px; cursor: pointer; width: auto; letter-spacing: 0;
    font-weight: 600;
  }
  .sb-company-change:hover { background: rgba(136,204,255,0.15); box-shadow: none; }

  .sb-nav { flex: 1; overflow-y: auto; padding: 10px 0; }
  .sb-nav::-webkit-scrollbar { width: 6px; }
  .sb-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  .sb-group { margin-bottom: 4px; }
  .sb-group-head {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 20px; cursor: pointer;
    color: #a0b8c8; font-size: 12px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    transition: color 0.12s; user-select: none;
  }
  .sb-group-head:hover { color: #fff; }
  .sb-group-icon { font-size: 15px; }
  .sb-group-count { margin-left: auto; font-size: 10px; color: #6b8290; }
  .sb-group-chevron {
    width: 10px; height: 10px; border-right: 1.5px solid currentColor;
    border-bottom: 1.5px solid currentColor; transform: rotate(45deg);
    transition: transform 0.18s;
  }
  .sb-group-chevron.open { transform: rotate(-135deg); }

  .sb-items { display: none; }
  .sb-items.open { display: block; }
  .sb-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 20px 9px 44px; cursor: pointer;
    color: #c9d6e0; font-size: 13.5px;
    transition: all 0.12s; border-left: 3px solid transparent;
    user-select: none;
  }
  .sb-item:hover { background: rgba(255,255,255,0.03); color: #fff; }
  .sb-item.active {
    background: rgba(136, 204, 255, 0.1);
    color: #88ccff; font-weight: 600;
    border-left-color: #88ccff;
  }
  .sb-item-count {
    font-size: 10px; color: #6b8290; background: rgba(0,0,0,0.3);
    padding: 2px 6px; border-radius: 8px; min-width: 24px; text-align: center;
  }
  .sb-item.active .sb-item-count { color: #88ccff; background: rgba(136,204,255,0.1); }

  .sb-footer {
    border-top: 1px solid rgba(255,255,255,0.05);
    padding: 14px 20px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .sb-user { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .sb-user-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, #3b82f6, #0ea5e9);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px;
  }
  .sb-user-info { flex: 1; overflow: hidden; }
  .sb-user-name {
    font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sb-user-role {
    font-size: 10px; letter-spacing: 0.5px;
    padding: 1px 6px; border-radius: 4px; margin-top: 2px;
    display: inline-block; font-weight: 700;
  }
  .role-staff      { background: rgba(148,163,184,0.2); color: #cbd5e1; }
  .role-manager    { background: rgba(34,197,94,0.2); color: #86efac; }
  .role-consultant { background: rgba(251,191,36,0.2); color: #fcd34d; }

  .sb-logout {
    background: transparent; border: 1px solid rgba(255,255,255,0.15);
    color: #a0b8c8; padding: 8px; font-size: 12.5px; width: 100%;
  }
  .sb-logout:hover { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: #fca5a5; box-shadow: none; }

  /* ===== 메인 영역 ===== */
  .main {
    flex: 1; overflow-y: auto; padding: 32px 40px;
  }
  .main-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 28px; padding-bottom: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .main-title { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
  .main-subtitle { font-size: 13px; color: #a0b8c8; }
  .main-meta {
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .meta-pill {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 4px 10px; border-radius: 6px;
    font-size: 11px; color: #a0b8c8; font-weight: 600;
    letter-spacing: 0.5px;
  }

  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px; margin-bottom: 28px;
  }
  .stat {
    background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 20px;
  }
  .stat .n { font-size: 28px; font-weight: 700; color: #88ccff; }
  .stat .l { font-size: 12px; color: #6b8290; margin-top: 4px; letter-spacing: 1px; }

  .placeholder-box {
    background: rgba(255, 255, 255, 0.04);
    border: 1px dashed rgba(255, 255, 255, 0.15);
    border-radius: 16px; padding: 60px 40px;
    text-align: center; margin-top: 16px;
  }
  .placeholder-box h2 { margin-bottom: 12px; }
  .placeholder-box p { color: #a0b8c8; line-height: 1.6; font-size: 14px; }

  .welcome-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 14px; margin-top: 20px;
  }
  .welcome-card {
    background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 22px 22px;
  }
  .welcome-card h3 {
    font-size: 15px; font-weight: 700; margin-bottom: 10px; color: #88ccff;
  }
  .welcome-card p {
    font-size: 13px; color: #a0b8c8; line-height: 1.6;
  }

  .loading-dot {
    display: inline-block; width: 10px; height: 10px; border-radius: 50%;
    background: #88ccff; animation: pulse 1.4s infinite ease-in-out;
    margin-right: 4px;
  }
  @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

  /* ===== v0.5: 입력폼 · v0.8: 이중중요성평가 추가 ===== */
  .edit-toolbar {
    display: flex; gap: 20px; align-items: center;
    margin-bottom: 24px; padding: 14px 16px;
    background: rgba(0,0,0,0.3); border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.06);
    position: sticky; top: 0; z-index: 5;
    flex-wrap: wrap;
  }
  .toolbar-block { display: flex; flex-direction: column; gap: 6px; }
  .toolbar-label {
    font-size: 10.5px; color: #6b8290; letter-spacing: 1.2px;
    font-weight: 700; text-transform: uppercase;
  }
  .tabgroup { display: flex; gap: 4px; flex-wrap: wrap; }
  .tab {
    padding: 6px 14px; border-radius: 7px; cursor: pointer;
    font-size: 13px; color: #a0b8c8;
    border: 1px solid transparent; background: transparent;
    width: auto; font-weight: 500; box-shadow: none;
    transition: all 0.12s;
  }
  .tab:hover {
    background: rgba(255,255,255,0.04); color: #fff; box-shadow: none;
    transform: none;
  }
  .tab.active {
    background: rgba(136,204,255,0.12); color: #88ccff;
    border-color: rgba(136,204,255,0.3); font-weight: 700;
  }

  .save-btn {
    margin-left: auto; padding: 9px 20px; font-size: 13.5px;
    width: auto; font-weight: 700;
    background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    box-shadow: 0 4px 12px rgba(16,185,129,0.2);
  }
  .save-btn:hover { box-shadow: 0 6px 18px rgba(16,185,129,0.45); }
  .save-status {
    font-size: 11.5px; color: #86efac; font-weight: 600;
    letter-spacing: 0.3px;
  }
  .save-status.dirty { color: #fcd34d; }

  .field-list { display: flex; flex-direction: column; }
  .field-row {
    display: grid;
    grid-template-columns: minmax(240px, 1fr) 2fr;
    gap: 28px;
    padding: 20px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    align-items: start;
  }
  .field-row:last-child { border-bottom: none; }

  .field-label {
    font-size: 14px; font-weight: 600; color: #e2e8f0;
    letter-spacing: -0.1px; line-height: 1.45;
  }
  .field-required { color: #f87171; margin-left: 3px; }
  .field-desc {
    font-size: 12px; color: #6b8290;
    margin-top: 5px; line-height: 1.55;
  }
  .field-context {
    font-size: 11px; color: #5a7a8c; margin-top: 6px;
    display: inline-flex; align-items: center; gap: 4px;
    font-weight: 500;
  }
  .field-gri {
    display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px;
  }
  .gri-tag {
    font-size: 10px; background: rgba(136,204,255,0.08);
    color: #7cb5e0; padding: 2px 7px; border-radius: 4px;
    letter-spacing: 0.3px; font-weight: 600;
  }

  .field-input-wrap {
    display: flex; gap: 10px; align-items: center;
  }
  .field-input { flex: 1; min-width: 0; }
  .field-unit {
    font-size: 12px; color: #a0b8c8; padding: 6px 10px;
    background: rgba(0,0,0,0.3); border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.06);
    white-space: nowrap; font-weight: 600; flex-shrink: 0;
  }

  textarea {
    width: 100%; min-height: 80px; resize: vertical;
    background: rgba(0, 0, 0, 0.35);
    border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 10px;
    padding: 11px 14px; color: #fff; font-size: 14px;
    font-family: inherit; line-height: 1.55;
    transition: border 0.15s;
  }
  textarea:focus { outline: none; border-color: #88ccff; }
  select {
    width: 100%;
    background: rgba(0, 0, 0, 0.35);
    border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 10px;
    padding: 11px 14px; color: #fff; font-size: 14px;
    font-family: inherit; cursor: pointer; appearance: none;
    background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2212%22%20height%3D%2212%22%20viewBox%3D%220%200%2020%2020%22%3E%3Cpath%20fill%3D%22%2388ccff%22%20d%3D%22M5%208l5%205%205-5z%22%2F%3E%3C%2Fsvg%3E");
    background-repeat: no-repeat; background-position: right 12px center; padding-right: 32px;
  }
  select:focus { outline: none; border-color: #88ccff; }
  input[type=number] {
    font-family: "SF Mono", "Consolas", monospace; letter-spacing: 0.3px;
  }
  input[type=date] {
    color-scheme: dark;
  }
  input[type=checkbox] {
    width: 18px; height: 18px; cursor: pointer; accent-color: #3b82f6;
  }
  .checkbox-wrap {
    display: flex; align-items: center; gap: 10px; padding: 10px 0;
  }
  .checkbox-wrap label {
    margin-bottom: 0; color: #e2e8f0; font-weight: 500;
    cursor: pointer; font-size: 13.5px; letter-spacing: 0;
  }
  .multi-wrap { display: flex; flex-wrap: wrap; gap: 6px; padding: 4px 0; }
  .multi-chip {
    padding: 6px 12px; border-radius: 6px; cursor: pointer;
    font-size: 12.5px; font-weight: 500; user-select: none;
    background: rgba(0,0,0,0.25); color: #a0b8c8;
    border: 1px solid rgba(255,255,255,0.1);
    transition: all 0.12s;
  }
  .multi-chip:hover { background: rgba(255,255,255,0.04); color: #fff; }
  .multi-chip.on {
    background: rgba(136,204,255,0.12); color: #88ccff;
    border-color: rgba(136,204,255,0.3); font-weight: 700;
  }

  .empty-note {
    color: #6b8290; font-size: 13px; padding: 8px 0;
  }
  /* ===== v0.8: 이중중요성평가 라이트 테마 ===== */
  .main-light {
    background: #f9fafb !important;
    color: #111827;
  }
  .main-light h2 { color: #111827; }
  .main-light p { color: #374151; }
  .mat-tabs {
    display: flex; gap: 2px;
    background: #fff;
    padding: 4px;
    border-radius: 10px;
    border: 1px solid #e5e7eb;
    overflow-x: auto;
    margin-bottom: 18px;
  }
  .mat-tab {
    flex: 1;
    min-width: 110px;
    padding: 8px 10px;
    border: none;
    background: transparent;
    color: #6b7280;
    font-size: 12px;
    font-weight: 500;
    border-radius: 7px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .mat-tab:hover { background: #f3f4f6; color: #111827; }
  .mat-tab.active {
    background: #111827;
    color: #fff;
    font-weight: 600;
  }
  .mat-saving {
    font-size: 11px;
    color: #6b7280;
    font-weight: 500;
    padding: 3px 10px;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 999px;
  }
  .mat-saving.saving { color: #d97706; border-color: #fcd34d; background: #fffbeb; }
  .mat-saving.saved { color: #059669; border-color: #a7f3d0; background: #ecfdf5; }
  /* ===== v0.8: 카테고리 자동 METRICS 표 ===== */
  .auto-summary-block {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 20px 24px;
    margin-bottom: 20px;
  }
  .auto-summary-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .auto-summary-title {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.02em;
  }
  .auto-summary-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
  }
  .auto-summary-copy {
    background: rgba(136, 204, 255, 0.15);
    color: #88ccff;
    border: 1px solid rgba(136, 204, 255, 0.3);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .auto-summary-copy:hover {
    background: rgba(136, 204, 255, 0.25);
  }
  .auto-summary-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .auto-summary-table th {
    background: rgba(255,255,255,0.06);
    padding: 10px 14px;
    text-align: left;
    color: rgba(255,255,255,0.8);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.02em;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .auto-summary-table th.latest { color: #10b981; }
  .auto-summary-table td {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.85);
  }
  .auto-summary-table .row-label { font-weight: 500; }
  .auto-summary-table .row-unit {
    color: rgba(255,255,255,0.5);
    font-size: 11px;
  }
  .auto-summary-table .row-num {
    text-align: right;
    font-feature-settings: 'tnum';
    font-variant-numeric: tabular-nums;
  }
  .auto-summary-table .row-num.latest {
    color: #10b981;
    font-weight: 600;
  }
  .auto-summary-table .row-delta {
    text-align: right;
    font-size: 12px;
    font-feature-settings: 'tnum';
  }
  .auto-summary-table .row-delta.up { color: #ef4444; }
  .auto-summary-table .row-delta.down { color: #10b981; }
  .auto-summary-empty {
    padding: 24px;
    text-align: center;
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    background: rgba(255,255,255,0.02);
    border-radius: 8px;
  }
  .auto-summary-missing {
    margin-top: 12px;
    padding: 10px 14px;
    background: rgba(245,158,11,0.08);

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

const SUPABASE_URL = "https://ucqqckuzuaeceuabndjw.supabase.co";
const SUPABASE_KEY = "sb_publishable_YsX59YkLF5vtK83k2DPxBg_6eM0Kev0";

const ROLE_LABEL = { staff: "담당자", manager: "매니저", consultant: "컨설턴트" };

// 그룹 메타 (순서·아이콘·라벨)
const GROUPS = [
  { key: "environment", label: "환경",        icon: "🌱", order: 1 },
  { key: "social",      label: "사회",        icon: "👥", order: 2 },
  { key: "governance",  label: "거버넌스",    icon: "⚖️", order: 3 },
  { key: "consultant",  label: "컨설턴트 전용", icon: "🎯", order: 4, consultantOnly: true },
];

// menu_categories 가 어떤 컬럼으로 그룹 구분을 하든 자동 판별
function detectGroup(cat) {
  // 1) 명시 컬럼
  const direct = cat.group || cat.category_group || cat.section || cat.parent_group || cat.area;
  if (direct) {
    const d = String(direct).toLowerCase();
    if (d.includes("env") || d.includes("환경")) return "environment";
    if (d.includes("soc") || d.includes("사회")) return "social";
    if (d.includes("gov") || d.includes("거버")) return "governance";
    if (d.includes("cons") || d.includes("consultant") || d.includes("컨설")) return "consultant";
  }
  // 2) code prefix
  const code = (cat.code || "").toLowerCase();
  if (/^env|^e[_-]/.test(code)) return "environment";
  if (/^soc|^s[_-]/.test(code)) return "social";
  if (/^gov|^g[_-]/.test(code)) return "governance";
  if (/^cons|^c[_-]/.test(code)) return "consultant";
  // 3) name 안전망
  const n = cat.name || cat.title || "";
  if (/기후|에너지|용수|폐수|폐기물|대기|원재료|생물다양|환경/.test(n)) return "environment";
  if (/임직원|채용|교육|안전|복리|노사|지역|고객/.test(n)) return "social";
  if (/이사회|주주|정책|윤리|반부패|경제|회사 ?기본/.test(n)) return "governance";
  if (/이중중요|content|검증|컨텐츠 ?인덱스/i.test(n)) return "consultant";
  return "environment";
}

// ==================== Supabase ====================
function useSupabase() {
  const [sb, setSb] = useState(null);
  useEffect(() => {
    import("https://esm.sh/@supabase/supabase-js@2").then(m => {
      setSb(m.createClient(SUPABASE_URL, SUPABASE_KEY));
    });
  }, []);
  return sb;
}

// ==================== 로그인 ====================
function LoginView({ supabase }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  async function submit(e) {
    e.preventDefault();
    setErr(""); setBusy(true);
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    setBusy(false);
    if (error) setErr("로그인 실패 · " + error.message);
  }

  return (
    <div className="center">
      <div className="card">
        <div className="logo">THE 4TH EDGE</div>
        <h1>ESG 플랫폼</h1>
        <p className="subtitle">GRI 2025 신규표준 · ESRS IG1 · 이중중요성평가 v2</p>
        {err && <div className="err">{err}</div>}
        <form onSubmit={submit}>
          <div className="field">
            <label>이메일</label>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)} required autoFocus />
          </div>
          <div className="field">
            <label>비밀번호</label>
            <input type="password" value={password} onChange={e => setPassword(e.target.value)} required />
          </div>
          <button type="submit" disabled={busy}>{busy ? "로그인 중…" : "로그인"}</button>
        </form>
        <div className="muted">v0.8 · 실시간 대시보드</div>
      </div>
    </div>
  );
}

// ==================== 회사 선택 ====================
function CompanyPickerView({ profile, companies, onPick, onLogout }) {
  return (
    <div className="center">
      <div className="card card-wide">
        <div className="logo">THE 4TH EDGE</div>
        <h1>회사 선택</h1>
        <p className="subtitle">
          {profile.full_name || profile.email} · {ROLE_LABEL[profile.role] || profile.role}
          <br />작업할 회사를 선택하세요
        </p>
        {companies.length === 0 ? (
          <div className="err">접근 가능한 회사가 없습니다. 관리자에게 companies 배열 할당을 요청하세요.</div>
        ) : (
          <div className="company-grid">
            {companies.map(c => (
              <button key={c.id} className="company-card" onClick={() => onPick(c)}>
                <div className="cname">{c.name}</div>
                <div className="ccode">{c.code || c.id.slice(0, 8)}</div>
              </button>
            ))}
          </div>
        )}
        <div style={{ marginTop: 28, textAlign: "center" }}>
          <button className="ghost" onClick={onLogout} style={{ width: "auto", padding: "8px 18px" }}>로그아웃</button>
        </div>
      </div>
    </div>
  );
}

// ==================== 사이드바 ====================
function Sidebar({ profile, company, categories, selectedId, onSelect, onChangeCompany, onLogout }) {
  // 그룹별 분류
  const grouped = useMemo(() => {
    const g = {};
    for (const k of GROUPS.map(x => x.key)) g[k] = [];
    for (const c of categories) {
      const grp = detectGroup(c);
      (g[grp] || g.environment).push(c);
    }
    // 각 그룹 내부 정렬 (display_order → name)
    for (const k of Object.keys(g)) {
      g[k].sort((a, b) => {
        const oa = a.display_order ?? a.order ?? 999;
        const ob = b.display_order ?? b.order ?? 999;
        if (oa !== ob) return oa - ob;
        return (a.name || "").localeCompare(b.name || "", "ko");
      });
    }
    return g;
  }, [categories]);

  // 그룹 접기/펴기 상태 (기본: 다 펼침)
  const [openGroups, setOpenGroups] = useState(() => {
    const s = {};
    GROUPS.forEach(g => s[g.key] = true);
    return s;
  });
  const toggleGroup = k => setOpenGroups(s => ({ ...s, [k]: !s[k] }));

  const visibleGroups = GROUPS.filter(g =>
    !g.consultantOnly || profile.role === "consultant"
  );

  const initial = (profile.full_name || profile.email || "?").trim().charAt(0).toUpperCase();
  const canChangeCompany = profile.role === "consultant" || (profile.companies && profile.companies.length > 1);

  return (
    <aside className="sidebar">
      <div className="sb-header">
        <div className="sb-brand">THE 4TH EDGE</div>
        <div className="sb-company">
          <div className="sb-company-name">{company.name}</div>
          {canChangeCompany && (
            <button className="sb-company-change" onClick={onChangeCompany}>변경</button>
          )}
        </div>
      </div>

      <nav className="sb-nav">
        <button
          className={"sb-item" + (!selectedId ? " active" : "")}
          onClick={() => onSelect(null)}
          style={{ marginBottom: 8, fontWeight: 600 }}
        >
          🏠 실시간 대시보드
        </button>
        {visibleGroups.map(g => {
          const items = grouped[g.key] || [];
          if (items.length === 0) return null;
          const open = openGroups[g.key];
          return (
            <div className="sb-group" key={g.key}>
              <div className="sb-group-head" onClick={() => toggleGroup(g.key)}>
                <span className="sb-group-icon">{g.icon}</span>
                <span>{g.label}</span>
                <span className="sb-group-count">{items.length}</span>
                <span className={`sb-group-chevron ${open ? "open" : ""}`}></span>
              </div>
              <div className={`sb-items ${open ? "open" : ""}`}>
                {items.map(c => (
                  <div
                    key={c.id}
                    className={`sb-item ${selectedId === c.id ? "active" : ""}`}
                    onClick={() => onSelect(c)}
                  >
                    <span>{c.name}</span>
                    {typeof c.field_count === "number" && (
                      <span className="sb-item-count">{c.field_count}</span>
                    )}
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </nav>

      <div className="sb-footer">
        <div className="sb-user">
          <div className="sb-user-avatar">{initial}</div>
          <div className="sb-user-info">
            <div className="sb-user-name">{profile.full_name || profile.email}</div>
            <span className={`sb-user-role role-${profile.role}`}>{ROLE_LABEL[profile.role] || profile.role}</span>
          </div>
        </div>
        <button className="sb-logout" onClick={onLogout}>로그아웃</button>
      </div>
    </aside>
  );
}

// ==================== 메인 영역 ====================
function WelcomePane({ company, categoriesCount, supabase, profile }) {
  const [inputs, setInputs] = useState([]);
  const [fields, setFields] = useState([]);
  const [categories, setCategories] = useState([]);
  const [matSession, setMatSession] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    let alive = true;
    (async () => {
      setLoading(true);
      const [ir, fr, cr, mr] = await Promise.all([
        supabase.from("data_inputs")
          .select("field_id, year, value_number, value_text, value_json, updated_at")
          .eq("company_id", company.id),
        supabase.from("data_fields")
          .select("id, field_code, label, unit, gri_disclosures, menu_category_id"),
        supabase.from("menu_categories").select("*"),
        supabase.from("materiality_sessions")
          .select("session_data, confirmed, confirmed_at, updated_at")
          .eq("company_id", company.id)
          .maybeSingle(),
      ]);
      if (!alive) return;
      setInputs(ir.data || []);
      setFields(fr.data || []);
      setCategories(cr.data || []);
      setMatSession(mr.data || null);
      setLoading(false);
    })();
    return () => { alive = false; };
  }, [company.id, supabase]);

  // ===== Scope 1·2·3 연도별 합계 =====
  const scopeByYear = useMemo(() => {
    const by = { 2023: { s1: 0, s2: 0, s3: 0 }, 2024: { s1: 0, s2: 0, s3: 0 }, 2025: { s1: 0, s2: 0, s3: 0 } };
    const fieldMap = {};
    fields.forEach(f => { fieldMap[f.id] = f; });
    inputs.forEach(inp => {
      const f = fieldMap[inp.field_id];
      if (!f || inp.value_number === null || inp.value_number === undefined) return;
      const v = parseFloat(inp.value_number);
      if (!by[inp.year] || !v) return;
      const griList = Array.isArray(f.gri_disclosures) ? f.gri_disclosures : [];
      const hit = (code) => griList.some(d => typeof d === "string" && d.includes(code));
      if (hit("305-1")) by[inp.year].s1 += v;
      else if (hit("305-2")) by[inp.year].s2 += v;
      else if (hit("305-3")) by[inp.year].s3 += v;
    });
    return by;
  }, [inputs, fields]);

  // ===== 전체 진행률 + 카테고리별 진행률 =====
  const stats = useMemo(() => {
    const totalFields = fields.length;
    const filledFieldIds = new Set();
    inputs.forEach(inp => {
      const hasVal = (inp.value_number !== null && inp.value_number !== undefined)
                  || (inp.value_text !== null && inp.value_text !== undefined && inp.value_text !== "")
                  || (inp.value_json !== null && inp.value_json !== undefined);
      if (hasVal) filledFieldIds.add(inp.field_id);
    });
    const filled = filledFieldIds.size;
    const overallPct = totalFields > 0 ? (filled / totalFields * 100) : 0;

    const fieldsByCat = {};
    fields.forEach(f => {
      if (!fieldsByCat[f.menu_category_id]) fieldsByCat[f.menu_category_id] = [];
      fieldsByCat[f.menu_category_id].push(f.id);
    });
    const filledByCat = {};
    inputs.forEach(inp => {
      const f = fields.find(ff => ff.id === inp.field_id);
      if (!f) return;
      const hasVal = (inp.value_number !== null && inp.value_number !== undefined)
                  || (inp.value_text !== null && inp.value_text !== undefined && inp.value_text !== "")
                  || (inp.value_json !== null && inp.value_json !== undefined);
      if (!hasVal) return;
      if (!filledByCat[f.menu_category_id]) filledByCat[f.menu_category_id] = new Set();
      filledByCat[f.menu_category_id].add(inp.field_id);
    });
    const catProgress = categories.map(c => {
      const total = (fieldsByCat[c.id] || []).length;
      const fld = (filledByCat[c.id] || new Set()).size;
      return { id: c.id, name: c.name, code: c.code, group: c.group, total, filled: fld, pct: total > 0 ? (fld / total * 100) : 0 };
    }).filter(c => c.total > 0).sort((a, b) => b.pct - a.pct);

    return { totalFields, filled, overallPct, catProgress };
  }, [inputs, fields, categories]);

  // 마지막 입력 시각
  const lastInputAt = useMemo(() => {
    if (inputs.length === 0) return null;
    return inputs.reduce((latest, i) => !i.updated_at || (latest && latest > i.updated_at) ? latest : i.updated_at, null);
  }, [inputs]);

  // 이중중대성 요약
  const matSummary = useMemo(() => {
    if (!matSession) return { confirmed: false, coreCount: 0, assessedCount: 0 };
    const sd = matSession.session_data || {};
    const responses = sd.responses || {};
    const coreTopics = sd.coreTopics || [];
    const assessed = Object.values(responses).filter(r =>
      r && r.applicable === true && r.scale > 0 && r.scope > 0 && r.irrem > 0 && r.finImpact > 0 && r.finLikelihood > 0
    ).length;
    return { confirmed: !!matSession.confirmed, coreCount: coreTopics.length, assessedCount: assessed };
  }, [matSession]);

  // ===== 3년 추세 SVG =====
  const renderScopeTrendSVG = () => {
    const years = [2023, 2024, 2025];
    const COL = { s1: "#ef4444", s2: "#f59e0b", s3: "#8b5cf6" };
    const allVals = years.flatMap(y => [scopeByYear[y].s1, scopeByYear[y].s2, scopeByYear[y].s3]);
    const maxVal = Math.max(...allVals, 1);
    const niceMax = Math.ceil(maxVal * 1.15 / 10) * 10 || 10;
    const W = 720, H = 280;
    const M = { top: 20, right: 30, bottom: 60, left: 60 };
    const PW = W - M.left - M.right;
    const PH = H - M.top - M.bottom;
    const groupW = PW / 3;
    const barW = 34, barGap = 6;
    const hasData = allVals.some(v => v > 0);

    return (
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", maxHeight: 340, display: "block" }}>
        {/* Y축 그리드 */}
        {Array.from({ length: 6 }).map((_, i) => {
          const y = M.top + (PH / 5) * i;
          const val = niceMax * (1 - i / 5);
          return (
            <g key={`grid-${i}`}>
              <line x1={M.left} y1={y} x2={M.left + PW} y2={y} stroke="rgba(255,255,255,0.08)" strokeDasharray="2 4" />
              <text x={M.left - 8} y={y + 4} textAnchor="end" fontSize="10" fill="rgba(255,255,255,0.5)">{val.toFixed(0)}</text>
            </g>
          );
        })}
        <line x1={M.left} y1={M.top + PH} x2={M.left + PW} y2={M.top + PH} stroke="rgba(255,255,255,0.3)" strokeWidth="1.5" />
        <text x={M.left - 44} y={M.top + PH / 2} fontSize="10" fill="rgba(255,255,255,0.5)"
          transform={`rotate(-90, ${M.left - 44}, ${M.top + PH / 2})`} textAnchor="middle">tCO₂eq</text>

        {/* 그룹 막대 */}
        {years.map((year, i) => {
          const gx = M.left + groupW * i + groupW / 2;
          const items = [
            { v: scopeByYear[year].s1, c: COL.s1, lbl: "Scope 1" },
            { v: scopeByYear[year].s2, c: COL.s2, lbl: "Scope 2" },
            { v: scopeByYear[year].s3, c: COL.s3, lbl: "Scope 3" },
          ];
          const total = items.length * barW + (items.length - 1) * barGap;
          const sx = gx - total / 2;
          return (
            <g key={`y-${year}`}>
              {items.map((it, j) => {
                const h = it.v > 0 ? (it.v / niceMax) * PH : 0;
                const bx = sx + j * (barW + barGap);
                const by = M.top + PH - h;
                return (
                  <g key={j}>
                    <rect x={bx} y={by} width={barW} height={h} fill={it.c} rx="3">
                      <title>{it.lbl} ({year}): {it.v.toFixed(2)} tCO₂eq</title>
                    </rect>
                    {it.v > 0.1 && h > 18 && (
                      <text x={bx + barW / 2} y={by - 4} textAnchor="middle" fontSize="10" fontWeight="700" fill={it.c}>
                        {it.v.toFixed(1)}
                      </text>
                    )}
                  </g>
                );
              })}
              <text x={gx} y={M.top + PH + 20} textAnchor="middle" fontSize="12" fontWeight="600" fill="rgba(255,255,255,0.85)">{year}년</text>
            </g>
          );
        })}

        {/* 범례 */}
        <g transform={`translate(${M.left + 10}, ${H - 18})`}>
          {[
            { lbl: "Scope 1 (직접)", c: COL.s1 },
            { lbl: "Scope 2 (전력)", c: COL.s2 },
            { lbl: "Scope 3 (공급망)", c: COL.s3 },
          ].map((it, i) => (
            <g key={i} transform={`translate(${i * 140}, 0)`}>
              <rect width="11" height="11" rx="2" fill={it.c} />
              <text x="16" y="10" fontSize="11" fill="rgba(255,255,255,0.85)">{it.lbl}</text>
            </g>
          ))}
        </g>

        {!hasData && (
          <text x={W / 2} y={H / 2} textAnchor="middle" fontSize="14" fill="rgba(255,255,255,0.4)">
            GRI 305-1·305-2·305-3 연계 필드 입력 시 자동 표시됩니다
          </text>
        )}
      </svg>
    );
  };

  if (loading) {
    return (
      <>
        <div className="main-header"><div>
          <div className="main-title">{company.name} · 대시보드</div>
          <div className="main-subtitle">데이터 불러오는 중...</div>
        </div></div>
      </>
    );
  }

  return (
    <>
      <div className="main-header">
        <div>
          <div className="main-title">{company.name} · ESG 실시간 대시보드</div>
          <div className="main-subtitle">
            {lastInputAt
              ? `마지막 입력: ${new Date(lastInputAt).toLocaleString("ko-KR", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" })}`
              : "좌측 사이드바에서 카테고리를 선택해 데이터 입력을 시작하세요"}
          </div>
        </div>
      </div>

      {/* KPI 4개 */}
      <div className="stats-grid">
        <div className="stat">
          <div className="n">{stats.filled}<span style={{ fontSize: 18, color: "rgba(255,255,255,0.5)" }}> / {stats.totalFields}</span></div>
          <div className="l">입력 완료 필드</div>
        </div>
        <div className="stat">
          <div className="n" style={{ color: stats.overallPct >= 80 ? "#10b981" : stats.overallPct >= 40 ? "#f59e0b" : "#fff" }}>
            {stats.overallPct.toFixed(1)}<span style={{ fontSize: 18 }}>%</span>
          </div>
          <div className="l">전체 입력 진행률</div>
        </div>
        <div className="stat">
          <div className="n">{matSummary.assessedCount}<span style={{ fontSize: 18, color: "rgba(255,255,255,0.5)" }}> / 15</span></div>
          <div className="l">이중중대성 평가</div>
        </div>
        <div className="stat">
          <div className="n" style={{ color: matSummary.confirmed ? "#10b981" : "#fff" }}>
            {matSummary.confirmed ? `🔒 ${matSummary.coreCount}` : "—"}
          </div>
          <div className="l">{matSummary.confirmed ? "핵심 이슈 확정" : "아직 미확정"}</div>
        </div>
      </div>

      {/* Scope 1·2·3 3년 추세 그래프 */}
      <div className="welcome-card" style={{ marginTop: 20 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4, flexWrap: "wrap" }}>

// ===== 값 직렬화 =====
const REPORT_YEARS = [2023, 2024, 2025];

function inputKey(fieldId, siteId, year) {
  return `${fieldId}__${siteId || "-"}__${year}`;
}

function readValue(field, row) {
  if (!row) {
    if (field.input_type === "boolean") return false;
    if (field.input_type === "multiselect") return [];
    if (field.input_type === "table") return null;
    return "";
  }
  switch (field.input_type) {
    case "number":
      return row.value_number ?? "";
    case "boolean":
      return row.value_text === "true";
    case "multiselect":
      return Array.isArray(row.value_json) ? row.value_json : [];
    case "table":
      return row.value_json ?? null;
    default:
      return row.value_text ?? "";
  }
}

function writeValue(field, val, row) {
  row.value_number = null;
  row.value_text = null;
  row.value_json = null;
  switch (field.input_type) {
    case "number":
      row.value_number = (val === "" || val === null || val === undefined) ? null : Number(val);
      break;
    case "boolean":
      row.value_text = val ? "true" : "false";
      break;
    case "multiselect":
      row.value_json = Array.isArray(val) ? val : [];
      break;
    case "table":
      row.value_json = val;
      break;
    default:
      row.value_text = val === null || val === undefined ? "" : String(val);
  }
}

// ===== 개별 입력 컴포넌트 =====
function FieldInput({ field, value, onChange }) {
  const id = `inp-${field.id}`;
  const opts = (() => {
    const o = field.options;
    if (Array.isArray(o)) return o;
    if (o && Array.isArray(o.values)) return o.values;
    if (o && Array.isArray(o.options)) return o.options;
    return [];
  })();
  const asOpt = o => typeof o === "string"
    ? { value: o, label: o }
    : { value: o.value ?? o.code ?? o.label, label: o.label ?? o.name ?? o.value };

  switch (field.input_type) {
    case "textarea":
      return <textarea id={id} value={value ?? ""} onChange={e => onChange(e.target.value)} placeholder="입력하세요" />;
    case "number":
      return <input id={id} type="number" step="any" value={value ?? ""}
        onChange={e => onChange(e.target.value === "" ? "" : Number(e.target.value))}
        placeholder="0" />;
    case "boolean":
      return (
        <div className="checkbox-wrap">
          <input id={id} type="checkbox" checked={!!value} onChange={e => onChange(e.target.checked)} />
          <label htmlFor={id}>{value ? "예 (해당)" : "아니오 (비해당)"}</label>
        </div>
      );
    case "date":
      return <input id={id} type="date" value={value ?? ""} onChange={e => onChange(e.target.value)} />;
    case "select":
      return (
        <select id={id} value={value ?? ""} onChange={e => onChange(e.target.value)}>
          <option value="">선택하세요</option>
          {opts.map(asOpt).map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
        </select>
      );
    case "multiselect": {
      const selected = Array.isArray(value) ? value : [];
      if (opts.length === 0) {
        return <textarea placeholder="쉼표로 구분하여 입력 (예: 생산, 연구, 영업)"
          value={selected.join(", ")}
          onChange={e => onChange(e.target.value.split(",").map(s => s.trim()).filter(Boolean))} />;
      }
      return (
        <div className="multi-wrap">
          {opts.map(asOpt).map(o => {
            const on = selected.includes(o.value);
            return (
              <span key={o.value}
                className={`multi-chip ${on ? "on" : ""}`}
                onClick={() => onChange(on ? selected.filter(x => x !== o.value) : [...selected, o.value])}>
                {on ? "✓ " : ""}{o.label}
              </span>
            );
          })}
        </div>
      );
    }
    case "table":
      return (
        <textarea id={id}
          placeholder='JSON 형식: [{"항목":"폐기물A","수량":12.5}]'
          style={{ fontFamily: "SF Mono, Consolas, monospace", fontSize: 12, minHeight: 120 }}
          value={typeof value === "object" && value !== null ? JSON.stringify(value, null, 2) : (value ?? "")}
          onChange={e => {
            const t = e.target.value;
            if (t.trim() === "") { onChange(null); return; }
            try { onChange(JSON.parse(t)); }
            catch { onChange(t); }
          }} />
      );
    case "file":
      return <input id={id} type="text"
        placeholder="파일 URL (Google Drive · Dropbox 공유 링크 붙여넣기)"
        value={value ?? ""} onChange={e => onChange(e.target.value)} />;
    case "text":
    default:
      return <input id={id} type="text" value={value ?? ""} onChange={e => onChange(e.target.value)} placeholder="입력하세요" />;
  }
}

// ===== 필드 행 =====
function FieldRow({ field, value, onChange, currentSite, currentYear }) {
  const ctx = [];
  if (field.is_by_site) ctx.push(currentSite?.name || "사업장 선택 필요");
  if (field.is_by_year) ctx.push(`${currentYear}년`);
  const ctxLabel = ctx.length > 0 ? ctx.join(" · ") : "전사 · 연도 무관";

  return (
    <div className="field-row">
      <div>
        <div className="field-label">
          {field.label}
          {field.is_required && <span className="field-required">*</span>}
        </div>
        {field.description && <div className="field-desc">{field.description}</div>}
        <div className="field-context">📍 {ctxLabel}</div>
        {Array.isArray(field.gri_disclosures) && field.gri_disclosures.length > 0 && (
          <div className="field-gri">
            {field.gri_disclosures.map(t => <span className="gri-tag" key={t}>{t}</span>)}
          </div>
        )}
      </div>
      <div className="field-input-wrap">
        <div className="field-input">
          <FieldInput field={field} value={value} onChange={onChange} />
        </div>
        {field.unit && <span className="field-unit">{field.unit}</span>}
      </div>
    </div>
  );
}

function CategoryEditPane({ category, company, supabase, profile }) {
  const [fields, setFields] = useState([]);
  const [sites, setSites] = useState([]);
  const [inputs, setInputs] = useState({});
  const [values, setValues] = useState({});
  const [currentSite, setCurrentSite] = useState(null);
  const [currentYear, setCurrentYear] = useState(2024);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [savedAt, setSavedAt] = useState(null);
  const [err, setErr] = useState("");

  // 카테고리 바뀌면 편집값 초기화
  useEffect(() => { setValues({}); setSavedAt(null); setErr(""); }, [category.id]);
  // 사업장/연도 바꾸면 편집값 초기화 (새 컨텍스트의 저장값을 봐야 하므로)
  useEffect(() => { setValues({}); }, [currentSite?.id, currentYear]);

  useEffect(() => {
    let alive = true;
    (async () => {
      setLoading(true); setErr("");
      const [fRes, sRes] = await Promise.all([
        supabase.from("data_fields").select("*")
          .eq("menu_category_id", category.id)
          .order("display_order", { ascending: true }),
        supabase.from("sites").select("*")
          .eq("company_id", company.id)
          .order("display_order", { ascending: true }),
      ]);
      if (!alive) return;
      if (fRes.error) { setErr("필드 로드 실패: " + fRes.error.message); setLoading(false); return; }
      if (sRes.error) { setErr("사업장 로드 실패: " + sRes.error.message); setLoading(false); return; }
      const fList = fRes.data || [];
      const sList = sRes.data || [];
      setFields(fList);
      setSites(sList);
      if (sList.length > 0 && !currentSite) {
        setCurrentSite(sList.find(s => s.is_primary) || sList[0]);
      }

      if (fList.length > 0) {
        const { data: ins, error: iErr } = await supabase.from("data_inputs").select("*")
          .eq("company_id", company.id)
          .in("field_id", fList.map(f => f.id));
        if (!alive) return;
        if (iErr) { setErr("입력값 로드 실패: " + iErr.message); setLoading(false); return; }
        const map = {};
        for (const r of (ins || [])) {
          map[inputKey(r.field_id, r.site_id, r.year)] = r;
        }
        setInputs(map);
      } else {
        setInputs({});
      }
      setLoading(false);
    })();
    return () => { alive = false; };
  }, [category.id, company.id, supabase]);

  function getValue(field) {
    if (field.id in values) return values[field.id];
    const siteId = field.is_by_site ? (currentSite?.id || null) : null;
    const yr = field.is_by_year ? currentYear : 0;
    return readValue(field, inputs[inputKey(field.id, siteId, yr)]);
  }
  function setFieldValue(field, val) {
    setValues(v => ({ ...v, [field.id]: val }));
  }

  async function handleSave() {
    if (saving) return;
    const entries = Object.entries(values);
    if (entries.length === 0) return;
    setSaving(true); setErr("");

    const rows = [];
    for (const [fieldId, val] of entries) {
      const field = fields.find(f => f.id === fieldId);
      if (!field) continue;
      const siteId = field.is_by_site ? (currentSite?.id || null) : null;
      const yr = field.is_by_year ? currentYear : 0;
      const row = {
        company_id: company.id,
        field_id:   field.id,
        site_id:    siteId,
        year:       yr,
        input_by:   profile.id,
        updated_at: new Date().toISOString(),
      };
      writeValue(field, val, row);
      rows.push(row);
    }

    const errors = [];
    await Promise.all(rows.map(async (row) => {
      try {
        let q = supabase.from("data_inputs").select("id")
          .eq("company_id", row.company_id)
          .eq("field_id",   row.field_id)
          .eq("year",       row.year);
        q = row.site_id === null ? q.is("site_id", null) : q.eq("site_id", row.site_id);
        const { data: existing, error: qErr } = await q.maybeSingle();
        if (qErr) throw qErr;

        if (existing?.id) {
          const { error: uErr } = await supabase.from("data_inputs").update(row).eq("id", existing.id);
          if (uErr) throw uErr;
        } else {
          const { error: iErr } = await supabase.from("data_inputs").insert({ ...row, created_at: new Date().toISOString() });
          if (iErr) throw iErr;
        }
      } catch (e) {
        errors.push(e.message || String(e));
      }
    }));

    if (errors.length > 0) {
      setErr(`저장 중 ${errors.length}건 오류: ${errors[0]}`);
      setSaving(false);
      return;
    }

    // 로컬 inputs 캐시 갱신
    setInputs(prev => {
      const next = { ...prev };
      for (const row of rows) {
        const k = inputKey(row.field_id, row.site_id, row.year);
        next[k] = { ...next[k], ...row };
      }
      return next;
    });
    setValues({});
    setSavedAt(new Date());
    setSaving(false);
  }

  const dirtyCount = Object.keys(values).length;
  const hasAnyBySite = fields.some(f => f.is_by_site);
  const hasAnyByYear = fields.some(f => f.is_by_year);

  return (
    <>
      <div className="main-header">
        <div>
          <div className="main-title">{category.name}</div>
          <div className="main-subtitle">
            {category.description || `${fields.length}개 입력 필드 · GRI 2025 준거`}
          </div>
        </div>
        <div className="main-meta">
          <span className="meta-pill">{fields.length}개 필드</span>
          {category.code && <span className="meta-pill">{category.code}</span>}
        </div>
      </div>

      <div className="edit-toolbar">
        {hasAnyBySite && (
          <div className="toolbar-block">
            <span className="toolbar-label">사업장</span>
            <div className="tabgroup">
              {sites.length === 0
                ? <span className="empty-note">등록된 사업장 없음</span>
                : sites.map(s => (
                  <button key={s.id}
                    className={`tab ${currentSite?.id === s.id ? "active" : ""}`}
                    onClick={() => setCurrentSite(s)}>{s.name}</button>
                ))}
            </div>
          </div>
        )}
        {hasAnyByYear && (
          <div className="toolbar-block">
            <span className="toolbar-label">연도</span>
            <div className="tabgroup">
              {REPORT_YEARS.map(y => (
                <button key={y}
                  className={`tab ${currentYear === y ? "active" : ""}`}
                  onClick={() => setCurrentYear(y)}>{y}</button>
              ))}
            </div>
          </div>
        )}
        <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 12 }}>
          {dirtyCount > 0 && <span className="save-status dirty">미저장 {dirtyCount}개</span>}
          {dirtyCount === 0 && savedAt && <span className="save-status">✓ 저장됨</span>}
          <button className="save-btn" onClick={handleSave} disabled={saving || dirtyCount === 0}>
            {saving ? "저장 중…" : "저장"}
          </button>
        </div>
      </div>

      {err && <div className="err">{err}</div>}

      {loading ? (
        <div style={{ textAlign: "center", padding: 48, color: "#6b8290" }}>
          <span className="loading-dot"></span>
          <span className="loading-dot" style={{ animationDelay: "0.2s" }}></span>
          <span className="loading-dot" style={{ animationDelay: "0.4s" }}></span>
          <div style={{ marginTop: 12, fontSize: 13 }}>입력 필드 로딩 중…</div>
        </div>
      ) : fields.length === 0 ? (
        <div className="placeholder-box">
          <h2>등록된 입력 필드가 없습니다</h2>
          <p>이 카테고리에는 아직 필드가 정의되지 않았습니다.</p>
        </div>
      ) : (
        <>
          <CategoryAutoSummary
            fields={fields}
            inputs={inputs}
            sites={sites}
            categoryName={category.name}
            categoryCode={category.code}
          />
          <div className="field-list">
            {fields.map(f => (
              <FieldRow key={f.id}
                field={f}
                value={getValue(f)}
                onChange={v => setFieldValue(f, v)}
                currentSite={currentSite}
                currentYear={currentYear} />
            ))}
          </div>
        </>
      )}
    </>
  );
}

  function setPicked(c) {
    setPickedRaw(c);
    try {
      if (c) localStorage.setItem(LS_COMPANY, c.id);
      else localStorage.removeItem(LS_COMPANY);
    } catch (e) {}
  }

  useEffect(() => {
    if (!supabase) return;
    let mounted = true;
    supabase.auth.getSession().then(({ data }) => {
      if (!mounted) return;
      setSession(data.session); setLoading(false);
    });

      setSession(s);

        setProfile(null); setCompanies([]); setPickedRaw(null); setProfileErr("");
        try { localStorage.removeItem(LS_COMPANY); } catch (e) {}

    });

      setProfileErr("");

        .from("users")
        .select("id, email, full_name, role, companies")
        .eq("id", session.user.id)
        .maybeSingle();
      if (!alive) return;
      if (pe) { setProfileErr("users 조회 실패: " + pe.message); return; }
      if (!prof) { setProfileErr(`users 테이블에 ${session.user.email} 프로필이 없습니다.`); return; }
      setProfile(prof);

      let q = supabase.from("companies").select("id, code, name").order("name");
      if (prof.role !== "consultant") q = q.in("id", prof.companies || []);
      const { data: cs, error: ce } = await q;
      if (!alive) return;
      if (ce) { setProfileErr("companies 조회 실패: " + ce.message); return; }
      const list = cs || [];
      setCompanies(list);

      // 새로고침 시 이전 선택 복원
      let restored = null;
      try {
        const savedId = localStorage.getItem(LS_COMPANY);
        if (savedId) restored = list.find(c => c.id === savedId) || null;
      } catch (e) {}
      if (restored) setPickedRaw(restored);
      else if (list.length === 1) { setPickedRaw(list[0]); try { localStorage.setItem(LS_COMPANY, list[0].id); } catch(e){} }
    })();
    return () => { alive = false; };
  }, [supabase, session]);

  async function handleLogout() {
    try { localStorage.removeItem(LS_COMPANY); } catch (e) {}
    if (supabase) await supabase.auth.signOut();
  }

  if (!supabase || loading) return <LoadingView />;
  if (!session) return <LoginView supabase={supabase} />;
  if (profileErr) return <ErrorView message={profileErr} onLogout={handleLogout} />;
  if (!profile) return <LoadingView />;
  if (!picked) return (
    <CompanyPickerView profile={profile} companies={companies}
      onPick={setPicked} onLogout={handleLogout} />
  );
  return (
    <DashboardShell
      profile={profile} company={picked} supabase={supabase}
      onChangeCompany={() => setPicked(null)} onLogout={handleLogout}
    />
  );
}

// ==========================================================================

// ==========================================================================
function calcSeverity(scale, scope, irrem) {
  if (!scale || !scope || !irrem) return 0;
  const geo = Math.pow(scale * scope * irrem, 1/3);
  return geo / 5;
}
function calcImpact(resp) {
  if (!resp || !resp.applicable) return 0;
  const severity = calcSeverity(resp.scale, resp.scope, resp.irrem);
  const likelihood = resp.isActual ? 1.0 : LIKERT5_MAP[resp.likelihood] || 0;
  return severity * likelihood;
}
function calcFinancial(resp) {
  if (!resp || !resp.applicable) return 0;
  const impact = LIKERT5_MAP[resp.finImpact] || 0;
  const likelihood = LIKERT5_MAP[resp.finLikelihood] || 0;
  return impact * likelihood;
}
function calculateMaterialityV2(responses, thresholdMode) {
  const applicable = MATERIALITY_TOPICS.filter(t => {
    const r = responses[t.code];
    return r && r.applicable && r.scale > 0 && r.scope > 0 && r.irrem > 0 && r.finImpact > 0 && r.finLikelihood > 0;
  });
  const scored = applicable.map(t => {
    const r = responses[t.code];
    const impact = calcImpact(r);
    const financial = calcFinancial(r);
    const maxAxis = Math.max(impact, financial);
    const avgAxis = (impact + financial) / 2;
    return {
      code: t.code, title: t.title, cat: t.cat, color: t.color,
      gri: t.gri, kesg: t.kesg,
      impact, financial, maxAxis, avgAxis,
      severity: calcSeverity(r.scale, r.scope, r.irrem),
      isActual: r.isActual, scale: r.scale, scope: r.scope, irrem: r.irrem,
      likelihood: r.likelihood, finImpact: r.finImpact, finLikelihood: r.finLikelihood,
    };
  });
  scored.sort((a, b) => b.maxAxis - a.maxAxis);
  const mode = thresholdMode || "top35";
  const n = scored.length;
  let core = [], manage = [], monitor = [];
  if (mode === "top35") {
    const coreCount = Math.max(1, Math.ceil(n * 0.35));
    const manageCount = Math.max(1, Math.ceil(n * 0.35));
    core = scored.slice(0, coreCount);
    manage = scored.slice(coreCount, coreCount + manageCount);
    monitor = scored.slice(coreCount + manageCount);
  } else if (mode === "axis06") {
    core = scored.filter(s => s.maxAxis >= 0.6);
    manage = scored.filter(s => s.maxAxis >= 0.3 && s.maxAxis < 0.6);
    monitor = scored.filter(s => s.maxAxis < 0.3);
  } else if (mode === "both05") {
    core = scored.filter(s => s.impact >= 0.5 && s.financial >= 0.5);
    manage = scored.filter(s => !(s.impact >= 0.5 && s.financial >= 0.5) && (s.impact >= 0.3 || s.financial >= 0.3));
    monitor = scored.filter(s => s.impact < 0.3 && s.financial < 0.3);
  }
  return { all: scored, core, manage, monitor };
}
function detectAnomalies(responses) {
  const anomalies = [];
  MATERIALITY_TOPICS.forEach(t => {
    const r = responses[t.code];
    if (!r) return;
    const impact = calcImpact(r);
    const financial = calcFinancial(r);
    if (r.applicable && (!r.scale) && (!r.scope) && (!r.irrem) && (!r.finImpact)) {
      anomalies.push({ type: "zero_all", severity: "high", code: t.code, title: t.title,
        msg: "해당된다고 표시하셨으나 평가 항목이 모두 비어있습니다. 재검토가 필요합니다." });
      return;
    }
    if (r.applicable && impact > 0 && financial > 0) {
      const gap = Math.abs(impact - financial);
      if (gap >= 0.4) anomalies.push({ type: "gap", severity: "medium", code: t.code, title: t.title,
        msg: `영향(${(impact*100).toFixed(0)}점)과 재무(${(financial*100).toFixed(0)}점) 점수 괴리가 큽니다 (${(gap*100).toFixed(0)}점). 재무 영향 관점을 다시 검토해보세요.` });
    }
    const bm = INDUSTRY_BENCHMARK[t.code];
    if (bm && r.applicable && impact > 0) {
      if (impact < bm.impact - 0.3) anomalies.push({ type: "below_industry_impact", severity: "medium", code: t.code, title: t.title,
        msg: `영향 평가(${(impact*100).toFixed(0)}점)가 업계 평균(${(bm.impact*100).toFixed(0)}점)보다 30점 이상 낮습니다. 동종 업계 관점에서 재검토가 필요합니다.` });
      if (financial < bm.financial - 0.3) anomalies.push({ type: "below_industry_fin", severity: "medium", code: t.code, title: t.title,
        msg: `재무 평가(${(financial*100).toFixed(0)}점)가 업계 평균(${(bm.financial*100).toFixed(0)}점)보다 30점 이상 낮습니다. 규제·고객 요구 변화를 고려하세요.` });
    }
    if ((t.code === "E1" || t.code === "S1") && r.applicable && impact < 0.4 && financial < 0.4) {
      anomalies.push({ type: "core_too_low", severity: "high", code: t.code, title: t.title,
        msg: `제조업 공통 핵심 이슈인 「${t.title}」이(가) 영향·재무 모두 40점 미만으로 평가되었습니다. 근거 재확인이 필요합니다.` });
    }
    if ((t.code === "E1" || t.code === "S1" || t.code === "E5") && r.applicable === false) {
      anomalies.push({ type: "mandatory_excluded", severity: "high", code: t.code, title: t.title,
        msg: `제조업에서 「${t.title}」은 일반적으로 필수 평가 대상입니다. '해당 없음' 사유를 명확히 하거나 재검토를 권장합니다.` });
    }
    if (r.applicable && r.scale && r.scope && r.irrem) {
      const vals = [r.scale, r.scope, r.irrem];
      const max = Math.max(...vals), min = Math.min(...vals);
      if (max - min >= 3) anomalies.push({ type: "severity_inconsistent", severity: "low", code: t.code, title: t.title,
        msg: `Scale(${r.scale})·Scope(${r.scope})·회복불가능성(${r.irrem}) 평가 편차가 큽니다. 논리적 일관성을 재확인해주세요.` });
    }
  });
  return anomalies;
}
function generateReportParagraphsV2(result, meta) {
  const { core, manage } = result;
  const stakeholder = meta.stakeholderNotes || "";
  const valueChain = meta.valueChain || {};
  const threshold = meta.threshold || "top35";

    "both05": "영향·재무 두 축이 모두 0.5 이상인 주제를 핵심 이슈로 선정"
  }[threshold];
  const methodology = `당사는 GRI 3: Material Topics 2021의 공식 4단계 절차에 따라 이중중대성평가를 수행하였습니다. 영향 중요도(Impact Materiality)는 Scale(규모)·Scope(범위)·Irremediable character(회복불가능성)의 3요소로 심각도(Severity)를 산정하고, 잠재적 영향에 대해서는 발생 가능성(Likelihood)을 추가 반영하였습니다. 재무 중요도(Financial Materiality)는 재무적 영향의 규모와 발생 가능성을 2요소로 평가하였습니다. ESRS 1 Materiality Assessment 및 K-ESG 가이드라인을 참조하여 15개 주제를 선정하였으며, ${thresholdDesc}하였습니다.`;
  const vcStages = Object.entries(valueChain).filter(([k,v]) => v).map(([k]) => {
    return VALUE_CHAIN_STAGES.find(s => s.key === k)?.label;
  }).filter(Boolean);
  const valueChainText = vcStages.length > 0 ?
    `가치사슬 전반(${vcStages.join(", ")})에 대한 영향 매핑을 수행하였으며, 각 단계의 주요 영향·리스크·기회를 식별하였습니다.` : "";
  let coreText = "";
  if (core.length > 0) {
    const coreList = core.map(c => `「${c.title}」`).join(", ");
    coreText = `평가 결과, ${coreList} 등 ${core.length}개 주제가 당사의 핵심 중요 이슈로 도출되었습니다.`;
  }
  const coreDetails = core.map(c => {
    return `■ ${c.title} (${c.code})\n  · GRI 연계: ${c.gri.join(", ")}\n  · K-ESG 항목: ${c.kesg.join(", ")}\n  · 영향 중요도: ${(c.impact * 100).toFixed(0)}점 (Severity ${(c.severity * 100).toFixed(0)}점)\n  · 재무 중요도: ${(c.financial * 100).toFixed(0)}점\n  · 종합: 영향·재무 중 최대값 ${(c.maxAxis * 100).toFixed(0)}점`;
  }).join("\n\n");
  let manageText = "";
  if (manage.length > 0) {
    const mList = manage.map(m => `「${m.title}」`).join(", ");
    manageText = `${mList}는 관리 이슈로 분류되어, 지속적 모니터링 및 개선 활동을 통해 리스크를 관리해 나갈 계획입니다.`;
  }
  return { methodology, valueChainText, coreText, coreDetails, manageText, stakeholder };
}

function MaterialityMatrixV2({ result, width = 640, height = 480 }) {
  const padding = { top: 40, right: 40, bottom: 60, left: 70 };
  const plotW = width - padding.left - padding.right;
  const plotH = height - padding.top - padding.bottom;
  const xScale = v => padding.left + v * plotW;
  const yScale = v => padding.top + (1 - v) * plotH;
  const colorMap = { emerald: "#10b981", blue: "#3b82f6", violet: "#8b5cf6" };
  return (
    <svg width={width} height={height} style={{ background: "#fafafa", borderRadius: 8 }}>
      <rect x={padding.left + plotW * 0.5} y={padding.top} width={plotW * 0.5} height={plotH * 0.5} fill="#fef3c7" opacity="0.3" />
      <text x={padding.left + plotW * 0.75} y={padding.top + 20} textAnchor="middle" fontSize="11" fill="#92400e" fontWeight="700">핵심 이슈 영역</text>
      <line x1={xScale(0.5)} y1={padding.top} x2={xScale(0.5)} y2={padding.top + plotH} stroke="#e5e7eb" strokeDasharray="4,4" />
      <line x1={padding.left} y1={yScale(0.5)} x2={padding.left + plotW} y2={yScale(0.5)} stroke="#e5e7eb" strokeDasharray="4,4" />
      <line x1={padding.left} y1={padding.top + plotH} x2={padding.left + plotW} y2={padding.top + plotH} stroke="#6b7280" strokeWidth="1.5" />
      <line x1={padding.left} y1={padding.top} x2={padding.left} y2={padding.top + plotH} stroke="#6b7280" strokeWidth="1.5" />
      <text x={padding.left + plotW / 2} y={height - 15} textAnchor="middle" fontSize="12" fill="#374151" fontWeight="600">환경·사회 영향 (Impact) →</text>
      <text x={20} y={padding.top + plotH / 2} textAnchor="middle" fontSize="12" fill="#374151" fontWeight="600" transform={`rotate(-90, 20, ${padding.top + plotH / 2})`}>재무 영향 (Financial) →</text>
      {result.all.map((d) => {
        const cx = xScale(d.impact);
        const cy = yScale(d.financial);
        const isCore = result.core.some(c => c.code === d.code);
        return (
          <g key={d.code}>
            <circle cx={cx} cy={cy} r={isCore ? 10 : 7} fill={colorMap[d.color]} opacity={isCore ? 0.9 : 0.55} stroke="#fff" strokeWidth="2" />
            <text x={cx} y={cy + 3} textAnchor="middle" fontSize="9" fill="#fff" fontWeight="700">{d.code}</text>
          </g>
        );
      })}
      {(() => {
        const bms = Object.values(INDUSTRY_BENCHMARK);
        if (bms.length === 0) return null;
        const avgImpact = bms.reduce((s, b) => s + b.impact, 0) / bms.length;
        const avgFinancial = bms.reduce((s, b) => s + b.financial, 0) / bms.length;
        return (
          <g>
            <line x1={xScale(avgImpact)} y1={padding.top} x2={xScale(avgImpact)} y2={padding.top + plotH} stroke="#9ca3af" strokeDasharray="2,3" opacity="0.6" />
            <line x1={padding.left} y1={yScale(avgFinancial)} x2={padding.left + plotW} y2={yScale(avgFinancial)} stroke="#9ca3af" strokeDasharray="2,3" opacity="0.6" />
            <text x={xScale(avgImpact) + 4} y={padding.top + 12} fontSize="9" fill="#6b7280">업계 평균</text>
          </g>
        );
      })()}
    </svg>
  );
}

// ==========================================================================
// MaterialityPanel (v0.8) - Supabase materiality_sessions에 자동 저장
// ==========================================================================
const MAT_KEY = "materiality_v2";
const MAT_SUBS = [
  { key: 'valuechain', icon: '🔗', label: '1. 가치사슬' },
  { key: 'topics', icon: '📋', label: '2. 주제 진단' },
  { key: 'assess', icon: '⚖️', label: '3. 이중 평가' },
  { key: 'anomaly', icon: '⚠️', label: '4. 이상치' },
  { key: 'matrix', icon: '📊', label: '5. 매트릭스' },
  { key: 'confirm', icon: '✅', label: '6. 확정' },
  { key: 'report', icon: '📝', label: '7. 보고서' },
];

function MaterialityPanel({ category, company, supabase, profile }) {
  const [data, setData] = useState({
    responses: {},
    meta: { valueChain: {}, threshold: 'top35', stakeholderNotes: '' },
    confirmed: false,
    confirmedAt: null,
    coreTopics: [],
    history: [],
  });
  const [subPage, setSubPage] = useState('valuechain');
  const [loading, setLoading] = useState(true);
  const [saveState, setSaveState] = useState('idle'); // idle|saving|saved|error
  const saveTimerRef = useRef(null);
  const dirtyRef = useRef(false);

  // 로드
  useEffect(() => {
    let alive = true;
    (async () => {
      setLoading(true);
      const { data: row, error } = await supabase
        .from('materiality_sessions')
        .select('session_data, confirmed, confirmed_at')
        .eq('company_id', company.id)
        .maybeSingle();
      if (!alive) return;
      if (error) {
        console.error('materiality load error', error);
        setLoading(false);
        return;
      }
      if (row && row.session_data) {
        const sd = row.session_data;
        setData({
          responses: sd.responses || {},
          meta: sd.meta || { valueChain: {}, threshold: 'top35', stakeholderNotes: '' },
          coreTopics: sd.coreTopics || [],
          history: sd.history || [],
          confirmed: row.confirmed || false,
          confirmedAt: row.confirmed_at || null,
        });
      }
      setLoading(false);
    })();
    return () => { alive = false; };
  }, [company.id, supabase]);

  // 저장 (debounce 700ms)
  useEffect(() => {
    if (loading) return;
    if (!dirtyRef.current) return;
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    setSaveState('saving');
    saveTimerRef.current = setTimeout(async () => {
      const payload = {
        company_id: company.id,
        session_data: {
          responses: data.responses,
          meta: data.meta,
          coreTopics: data.coreTopics,
          history: data.history,
        },
        confirmed: data.confirmed,
        confirmed_at: data.confirmedAt,
        updated_at: new Date().toISOString(),
      };
      const { error } = await supabase
        .from('materiality_sessions')
        .upsert(payload, { onConflict: 'company_id' });
      if (error) {
        console.error('materiality save error', error);
        setSaveState('error');
      } else {
        setSaveState('saved');
        dirtyRef.current = false;
      }
    }, 700);
    return () => { if (saveTimerRef.current) clearTimeout(saveTimerRef.current); };
  }, [data, loading, company.id, supabase]);

  // compat wrapper (ConfirmPage·ReportPage가 쓰는 setBlockData)
  const setBlockDataCompat = (key, payload) => {
    if (payload && payload.content_json) {
      dirtyRef.current = true;
      setData(payload.content_json);
    }
  };

  // helpers
  const updateResponse = (code, patch) => {
    dirtyRef.current = true;
    setData(d => ({ ...d, responses: { ...d.responses, [code]: { ...(d.responses[code] || {}), ...patch } } }));
  };
  const clearResponse = (code) => {
    dirtyRef.current = true;
    setData(d => {
      const next = { ...d.responses };
      delete next[code];
      return { ...d, responses: next };
    });
  };
  const updateMeta = (patch) => {
    dirtyRef.current = true;
    setData(d => ({ ...d, meta: { ...d.meta, ...patch } }));
  };

  if (loading) {
    return <div style={{ padding: 40, textAlign: 'center', color: '#6b7280' }}>이중중요성평가 세션을 불러오는 중...</div>;
  }

  const saveLabel = saveState === 'saving' ? '저장 중…' : saveState === 'saved' ? '✓ 저장됨' : saveState === 'error' ? '⚠ 저장 실패' : '';
  const saveCls = saveState === 'saving' ? 'mat-saving saving' : saveState === 'saved' ? 'mat-saving saved' : 'mat-saving';

  return (
    <div style={{ padding: '24px 32px', maxWidth: 1200 }}>
      <div style={{ marginBottom: 14 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 4 }}>
          <h2 style={{ fontSize: 22, fontWeight: 700, color: '#111827', margin: 0 }}>🎯 이중중요성평가 v2</h2>
          {saveLabel && <span className={saveCls}>{saveLabel}</span>}
          {data.confirmed && <span style={{ fontSize: 11, fontWeight: 700, color: '#fff', background: '#059669', padding: '3px 10px', borderRadius: 4 }}>🔒 확정됨</span>}
        </div>
        <p style={{ fontSize: 13, color: '#6b7280' }}>GRI 3 Material Topics 2021 · ESRS 1 · VSME · K-ESG · {company.name}</p>
      </div>
      <div className="mat-tabs">
        {MAT_SUBS.map(s => (
          <button key={s.key}
            className={`mat-tab ${subPage === s.key ? 'active' : ''}`}
            onClick={() => setSubPage(s.key)}>
            <span style={{ marginRight: 4 }}>{s.icon}</span>{s.label}
          </button>
        ))}
      </div>
      <div>
        {subPage === 'valuechain' && <ValueChainPage meta={data.meta} updateMeta={updateMeta} />}
        {subPage === 'topics' && <TopicsPage responses={data.responses} updateResponse={updateResponse} />}
        {subPage === 'assess' && <AssessPage responses={data.responses} updateResponse={updateResponse} clearResponse={clearResponse} />}
        {subPage === 'anomaly' && <AnomalyPage responses={data.responses} />}
        {subPage === 'matrix' && <MatrixPage responses={data.responses} meta={data.meta} updateMeta={updateMeta} />}
        {subPage === 'confirm' && <ConfirmPage responses={data.responses} data={data} setBlockData={setBlockDataCompat} MAT_KEY={MAT_KEY} meta={data.meta} />}
        {subPage === 'report' && <ReportPage responses={data.responses} data={data} setBlockData={setBlockDataCompat} MAT_KEY={MAT_KEY} meta={data.meta} updateMeta={updateMeta} />}
      </div>
    </div>
  );
}

  return (
    <div style={{ maxWidth: 900 }}>
      <div style={{ marginBottom: 20 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
          <h3 style={{ fontSize: 18, fontWeight: 700, color: "#111827", margin: 0 }}>🔗 1단계: 가치사슬 매핑</h3>
          {checkedCount > 0 && <span style={{ fontSize: 11, fontWeight: 700, color: "#fff", background: "#10b981", padding: "3px 10px", borderRadius: 4 }}>✅ 자동저장됨</span>}
        </div>
        <p style={{ fontSize: 13, color: "#6b7280", marginBottom: 4 }}>당사의 사업 활동이 영향을 미치는 가치사슬 단계를 체크하세요. <strong>GRI 3의 필수 사전 단계</strong>입니다.</p>
        <p style={{ fontSize: 12, color: "#9ca3af" }}>선택: {checkedCount} / {VALUE_CHAIN_STAGES.length}</p>
      </div>
      <div style={{ background: "#eff6ff", border: "1px solid #bfdbfe", borderRadius: 8, padding: 14, marginBottom: 16, fontSize: 12, color: "#1e40af" }}>
        💡 가치사슬이 넓을수록 영향 범위(Scope) 점수가 높아집니다. 단, 실제 통제·영향력이 있는 단계만 체크하세요.
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 10 }}>
        {VALUE_CHAIN_STAGES.map(s => {
          const checked = vc[s.key];
          return (
            <div key={s.key} onClick={() => toggleStage(s.key)}
              style={{ cursor: "pointer", background: checked ? "#ecfdf5" : "#fff",
                border: `2px solid ${checked ? "#10b981" : "#e5e7eb"}`,
                borderRadius: 8, padding: 14, transition: "all 0.15s" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ width: 20, height: 20, borderRadius: 4,
                  background: checked ? "#10b981" : "#fff",
                  border: `2px solid ${checked ? "#10b981" : "#d1d5db"}`,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  color: "#fff", fontSize: 12, fontWeight: 700 }}>{checked ? "✓" : ""}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "#111827" }}>{s.label}</div>
                  <div style={{ fontSize: 11, color: "#6b7280", marginTop: 2 }}>{s.desc}</div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

                        </div>
